# git-cliff ~ default configuration file
# https://git-cliff.org/docs/configuration
# yaml-language-server: $schema=https://www.schemastore.org/any.json

"$schema"   = "https://gist.githubusercontent.com/Nick2bad4u/5a39907931f3dc6d11ed1149ad4ac549/raw/9ee6a46909c466d15568cde15aa0c132d377655d/generic.schema.json"
description = "Configuration file for git-cliff to generate changelogs based on conventional commits."
name        = "Repository Changelog Configuration"
version     = "1.0.1"

[changelog]
    header = """
<!-- markdownlint-disable -->
<!-- eslint-disable markdown/no-missing-label-refs -->
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
    body = """
{% if version %}\
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
  ## [Unreleased]
{% endif %}
{% if commit_range and commit_range.from and commit_range.to %}
  - <b>Commit Range: ➡️</b> \
  [`{{ commit_range.from | truncate(length=7, end="") }}...{{ commit_range.to | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/{{ commit_range.from }}...{{ commit_range.to }} "View full commit range on GitHub")
{% endif %}
{% if bump_type == "major" %}
  > ⚠️ **Major release:** this version may contain breaking changes. Review upgrade notes carefully.
{% elif bump_type == "minor" %}
  > ✨ **Minor release:** this version adds backwards-compatible features and improvements.
{% elif bump_type == "patch" %}
  > **Patch release:** this version focuses on fixes, maintenance, and smaller improvements.
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    - [`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }} "Diff: {{ commit.statistics.files_changed }} file{% if commit.statistics.files_changed != 1 %}s{% endif %}, ++{{ commit.statistics.additions }} | --{{ commit.statistics.deletions }}") — {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
      {% if commit.breaking %}[**breaking**] {% endif %}\
      {{ commit.message
          | upper_first
          | replace(from="\n", to="\n    ")
          | replace(from=" - ", to="\n    - ")
      }}

  {% endfor %}
{% endfor %}\n
{% for submodule_path, commits in submodule_commits %}
    ### {{ submodule_path | upper_first }}
    {% for group, commits in commits | group_by(attribute="group") %}
        #### {{ group | upper_first }}
        {% for commit in commits %}
          - {{ commit.message | upper_first }}\
        {% endfor %}
    {% endfor %}
{% endfor %}\n
{% if commit.footer %}
  {{ commit.footer | trim | indent(width=8) }}
{% endif %}
"""
    footer = """
## ⭐ Contributors
Thanks to all the [contributors](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/graphs/contributors) for their hard work!
## License
This project is licensed under the [Unlicense](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/blob/main/LICENSE).
*This changelog was automatically generated with [git-cliff](https://github.com/orhun/git-cliff).*
"""
    trim = true
    postprocessors = [
        { pattern = 'Merge branch', replace = "[chore] Merge Branch" },
        { pattern = '\[dependency\]', replace = 'test' },
        { pattern = 'merge branch', replace = "[chore] Merge Branch" },
        { pattern = 'Bump the.*?group with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*', replace = "[dependency] Update dependency group" },
        { pattern = 'Bumps the npm-all group.*?with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*', replace = "[dependency] Update npm dependencies" },
        { pattern = '\[dependency\] \[chore\] Bump the.*?with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*', replace = "[dependency] Update dependencies" },
        { pattern = 'Bump ([a-zA-Z0-9@\-\/]+) from.*?to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        { pattern = 'Bump ([a-zA-Z0-9@\-\/]+) to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        { pattern = 'Bumps \[([^\]]+)\].*?from.*?to.*?(\n\n.*?)*', replace = "[dependency] Update $1" },
        { pattern = 'Bump', replace = "[dependency] Update" },
        { pattern = '\n\nSigned-off-by:.*', replace = "" }
    ]
    protect_breaking_commits = false
    render_always = true

[git]
    conventional_commits = true
    filter_unconventional = false
    split_commits = false
    use_branch_tags = false
    recurse_submodules = true
    commit_parsers = [
        { message = "^Merge branch", skip = true },
        { message = "^Merge pull request", skip = true },
        { message = "^merge branch", skip = true },
        { message = "^chore\\(pr\\)", skip = true },
        { message = "^chore\\(pull\\)", skip = true },
        { message = "^chore\\(release\\): prepare for", skip = true },
        { body = ".*security.*", group = "<!-- 12 -->️ Security" },
        { message = ".*security.*", group = "<!-- 12 -->️ Security" },
        { message = "^chore\\(deps.*\\)", group = "<!-- 11 --> Dependencies" },
        { message = ".*dependabot.*", group = "<!-- 11 --> Dependencies" },
        { message = ".*npm-all.*", group = "<!-- 11 --> Dependencies" },
        { message = "^Bump [a-zA-Z0-9@\\-\\/]+", group = "<!-- 11 --> Dependencies" },
        { message = "^Bump the.*group with \\d+ updates", group = "<!-- 11 --> Dependencies" },
        { message = "^Bumps \\[.*\\]", group = "<!-- 11 --> Dependencies" },
        { message = "^Bumps the.*group with \\d+ updates", group = "<!-- 11 --> Dependencies" },
        { message = "^\\[dependency\\]", group = "<!-- 11 --> Dependencies" },
        { message = "^revert", group = "<!-- 10 -->⏪ Reverts" },
        { message = "^.*\\[feat\\]", group = "<!-- 0 -->✨ Features" },
        { message = "^.*\\[fix\\]", group = "<!-- 1 -->️ Bug Fixes" },
        { message = "^.*\\[refactor\\]", group = "<!-- 2 --> Refactor" },
        { message = "^.*\\[docs\\]", group = "<!-- 3 --> Documentation" },
        { message = "^.*\\[perf\\]", group = "<!-- 4 -->⚡ Performance" },
        { message = "^.*\\[style\\]", group = "<!-- 5 --> Styling" },
        { message = "^.*\\[test\\]", group = "<!-- 6 --> Testing" },
        { message = "^.*\\[chore\\]", group = "<!-- 7 --> Chores" },
        { message = "^.*\\[ci\\]", group = "<!-- 8 --> CI/CD" },
        { message = "^.*\\[build\\]", group = "<!-- 9 --> Build System" },
        { message = "^.*\\[revert\\]", group = "<!-- 10 -->⏪ Reverts" },
        { message = "^build", group = "<!-- 9 --> Build System" },
        { message = "^ci", group = "<!-- 8 --> CI/CD" },
        { message = "^docs?", group = "<!-- 3 --> Documentation" },
        { message = "^feat", group = "<!-- 0 -->✨ Features" },
        { message = "^fix", group = "<!-- 1 -->️ Bug Fixes" },
        { message = "^perf", group = "<!-- 4 -->⚡ Performance" },
        { message = "^refactor", group = "<!-- 2 --> Refactor" },
        { message = "^style", group = "<!-- 5 --> Styling" },
        { message = "^test", group = "<!-- 6 --> Testing" },
        { message = "^chore", group = "<!-- 7 --> Chores" },
        { message = ".*\\.ya?ml", group = "<!-- 8 --> CI/CD" },
        { message = ".*workflow.*", group = "<!-- 8 --> CI/CD" },
        { message = ".*", group = "<!-- 13 -->️ Other Changes" }
    ]
    filter_commits = false
    topo_order = false
    sort_commits = "newest"

[remote]
    offline = true

    [remote.github]
        owner = "Nick2bad4u"
repo  = "semver-release-recommender"
