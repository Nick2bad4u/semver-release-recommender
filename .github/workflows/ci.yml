# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Continuous Integration"

run-name: "CI • ${{ github.ref_name }} @${{ github.actor }}"

on:
    push:
        branches:
            - "main"
    pull_request:
    merge_group:
        types:
            - "checks_requested"
    workflow_dispatch:

concurrency:
    group: "ci-${{ github.workflow }}-${{ github.ref }}"
    cancel-in-progress: true

defaults:
    run:
        shell: "bash"

jobs:
    test:
        name: "Test"
        runs-on: "ubuntu-latest"
        timeout-minutes: 15
        permissions:
            contents: "read"
            id-token: "write"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout Repository"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0

            - name: "Setup Node.js"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version: "24"
                  cache: "npm"

            - name: "Setup Python"
              uses: "actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1" # v6
              with:
                  python-version: "3.14"
                  cache: "pip"

            - name: "Install Node Dependencies"
              run: "npm ci"

            - name: "Install Python Dependencies"
              run: "python -m pip install -r requirements-dev.txt"

            - name: "Run Release Verification"
              run: "npm run release:verify"

            - name: "Upload Python test results to Codecov"
              if: "${{ !cancelled() && hashFiles('coverage/pytest/junit.xml') != '' }}"
              uses: "codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f" # v7.0.0
              with:
                  use_oidc: true
                  slug: "${{ github.repository }}"
                  files: "coverage/pytest/junit.xml"
                  flags: "python"
                  name: "pytest-junit-python"
                  report_type: "test_results"
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

            - name: "Upload Python coverage to Codecov"
              if: "${{ !cancelled() && hashFiles('coverage/python/coverage.xml') != '' }}"
              uses: "codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f" # v7.0.0
              with:
                  use_oidc: true
                  slug: "${{ github.repository }}"
                  files: "coverage/python/coverage.xml"
                  flags: "python"
                  name: "pytest-coverage-python"
                  report_type: "coverage"
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true
